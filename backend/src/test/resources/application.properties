server.port=8080

spring.application.name=praxis-backend-test

# Testes de integração rodam contra PostgreSQL real via Testcontainers (jdbc:tc), porque as
# migrations Flyway usam sintaxe exclusiva do PostgreSQL (ex.: índice parcial na V14) que o H2
# não suporta. Requer Docker no ambiente de execução (o CI do GitHub Actions tem).
# Para rodar localmente SEM Docker, aponte para um Postgres local via override, ex.:
#   -Dspring.datasource.url=jdbc:postgresql://localhost:5432/praxis_test \
#   -Dspring.datasource.driver-class-name=org.postgresql.Driver -Dspring.datasource.username=...
spring.datasource.url=jdbc:tc:postgresql:16:///praxis
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/migration/{vendor}
spring.flyway.ignore-migration-patterns=*:pending
spring.flyway.out-of-order=${SPRING_FLYWAY_OUT_OF_ORDER:true}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

praxis.public-base-url=http://localhost:8080
praxis.candidate-page-base-url=http://localhost:8080
praxis.attempt-link-ttl-hours=168
praxis.attempt-session-ttl-hours=24
praxis.recommend-interview-threshold=70
praxis.answer-grace-period-seconds=15
praxis.competency-weight-tolerance=0.001
praxis.outbox-scheduler-enabled=false
praxis.callback-delivery-enabled=false
praxis.security.enabled=false
praxis.default-empresa-id=empresa-1
praxis.jwt-secret=dev-praxis-jwt-secret-2026-32-characters-minimum
praxis.jwt-expiration-hours=8
praxis.privacy-retention-days=180
praxis.privacy-retention-enabled=false
praxis.privacy-retention-cron=0 30 3 * * *
praxis.engagement.capture-events-without-webhook=true

# Agendamentos de retencao desligados nos testes de contexto; a logica e coberta por testes unitarios.
praxis.retention.customer-health-enabled=false
praxis.engagement.report-enabled=false
praxis.billing.dunning-enabled=false

server.forward-headers-strategy=framework

springdoc.swagger-ui.path=/docs
