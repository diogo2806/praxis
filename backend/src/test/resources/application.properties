server.port=8080

spring.application.name=praxis-backend-test

spring.datasource.url=jdbc:h2:mem:praxis;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

praxis.public-base-url=http://localhost:8080
praxis.integration-token=dev-company-token

springdoc.swagger-ui.path=/docs
