server.port=8080

spring.application.name=praxis-backend

spring.datasource.url=${PRAXIS_DATASOURCE_URL}
spring.datasource.username=${PRAXIS_DATASOURCE_USERNAME}
spring.datasource.password=${PRAXIS_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=${PRAXIS_JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false

praxis.public-base-url=${PRAXIS_PUBLIC_BASE_URL:http://localhost:8080}
praxis.integration-token=${PRAXIS_INTEGRATION_TOKEN}
praxis.attempt-link-ttl-hours=${PRAXIS_ATTEMPT_LINK_TTL_HOURS:168}
praxis.attempt-session-ttl-hours=${PRAXIS_ATTEMPT_SESSION_TTL_HOURS:24}
praxis.recommend-interview-threshold=${PRAXIS_RECOMMEND_INTERVIEW_THRESHOLD:70}
praxis.competency-weight-tolerance=${PRAXIS_COMPETENCY_WEIGHT_TOLERANCE:0.001}
praxis.gupy-rate-limit-requests-per-minute=${PRAXIS_GUPY_RATE_LIMIT_REQUESTS_PER_MINUTE:100}
praxis.authoring-rate-limit-requests-per-minute=${PRAXIS_AUTHORING_RATE_LIMIT_REQUESTS_PER_MINUTE:30}
praxis.delivery-scheduler-enabled=${PRAXIS_DELIVERY_SCHEDULER_ENABLED:true}
praxis.delivery-scheduler-fixed-delay-ms=${PRAXIS_DELIVERY_SCHEDULER_FIXED_DELAY_MS:30000}
praxis.security.enabled=${PRAXIS_SECURITY_ENABLED:true}
praxis.jwt-secret=${PRAXIS_JWT_SECRET}
praxis.jwt-expiration-hours=${PRAXIS_JWT_EXPIRATION_HOURS:8}
praxis.webhook-allowed-hosts=${PRAXIS_WEBHOOK_ALLOWED_HOSTS:}

springdoc.swagger-ui.path=/docs
