server.port=8080

spring.application.name=praxis-backend

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?currentSchema=${DB_SCHEMA:public}
spring.datasource.username=${DB_USER:${PRAXIS_DATASOURCE_USERNAME:postgres}}
spring.datasource.password=${DB_PASS:${PRAXIS_DATASOURCE_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/migration/{vendor}
spring.flyway.default-schema=${DB_SCHEMA:public}
spring.flyway.schemas=${DB_SCHEMA:public}

spring.jpa.hibernate.ddl-auto=${PRAXIS_JPA_DDL_AUTO:none}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:public}

spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}

server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:5}
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:50}

spring.jmx.enabled=${SPRING_JMX_ENABLED:false}
spring.main.lazy-initialization=${SPRING_MAIN_LAZY_INITIALIZATION:false}

praxis.public-base-url=${PRAXIS_PUBLIC_BASE_URL:http://localhost:8080}
praxis.integration-token=${PRAXIS_INTEGRATION_TOKEN}
praxis.attempt-link-ttl-hours=${PRAXIS_ATTEMPT_LINK_TTL_HOURS:168}
praxis.attempt-session-ttl-hours=${PRAXIS_ATTEMPT_SESSION_TTL_HOURS:24}
praxis.recommend-interview-threshold=${PRAXIS_RECOMMEND_INTERVIEW_THRESHOLD:70}
praxis.competency-weight-tolerance=${PRAXIS_COMPETENCY_WEIGHT_TOLERANCE:0.001}
praxis.gupy-rate-limit-requests-per-minute=${PRAXIS_GUPY_RATE_LIMIT_REQUESTS_PER_MINUTE:100}
praxis.authoring-rate-limit-requests-per-minute=${PRAXIS_AUTHORING_RATE_LIMIT_REQUESTS_PER_MINUTE:30}
praxis.rate-limit-cleanup-delay-ms=${PRAXIS_RATE_LIMIT_CLEANUP_DELAY_MS:300000}
praxis.delivery-scheduler-enabled=${PRAXIS_DELIVERY_SCHEDULER_ENABLED:true}
praxis.delivery-scheduler-fixed-delay-ms=${PRAXIS_DELIVERY_SCHEDULER_FIXED_DELAY_MS:30000}
praxis.security.enabled=${PRAXIS_SECURITY_ENABLED:true}
praxis.default-tenant-id=${PRAXIS_DEFAULT_TENANT_ID:tenant-1}
praxis.jwt-secret=${PRAXIS_JWT_SECRET}
praxis.jwt-expiration-hours=${PRAXIS_JWT_EXPIRATION_HOURS:8}
praxis.cors.allowed-origins=${PRAXIS_CORS_ALLOWED_ORIGINS:}
praxis.webhook-allowed-hosts=${PRAXIS_WEBHOOK_ALLOWED_HOSTS:}
praxis.privacy-retention-days=${PRAXIS_PRIVACY_RETENTION_DAYS:180}
praxis.privacy-retention-enabled=${PRAXIS_PRIVACY_RETENTION_ENABLED:true}
praxis.privacy-retention-cron=${PRAXIS_PRIVACY_RETENTION_CRON:0 30 3 * * *}

praxis.object-storage.endpoint=${OBJECT_STORAGE_ENDPOINT:}
praxis.object-storage.public-url=${OBJECT_STORAGE_PUBLIC_URL:}
praxis.object-storage.region=${OBJECT_STORAGE_REGION:us-east-1}
praxis.object-storage.access-key=${OBJECT_STORAGE_ACCESS_KEY:}
praxis.object-storage.secret-key=${OBJECT_STORAGE_SECRET_KEY:}
praxis.object-storage.bucket=${OBJECT_STORAGE_BUCKET:praxis-media}
praxis.object-storage.path-style=${OBJECT_STORAGE_PATH_STYLE:true}

spring.servlet.multipart.max-file-size=${PRAXIS_MEDIA_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${PRAXIS_MEDIA_MAX_REQUEST_SIZE:12MB}

server.forward-headers-strategy=framework

springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
