services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxis-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=praxis
      - DB_USER=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - DB_SCHEMA=public
      - PRAXIS_JPA_DDL_AUTO=validate
      - PRAXIS_INTEGRATION_TOKEN=dev-integration-token
      - PRAXIS_JWT_SECRET=dev-jwt-secret-change-me
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - praxis-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: praxis-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - praxis-network

  postgres:
    image: postgres:17-alpine
    container_name: praxis-postgres
    environment:
      - POSTGRES_DB=praxis
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - praxis-network

volumes:
  postgres_data:

networks:
  praxis-network:
    driver: bridge
