services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxis-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=praxis
      - DB_USER=${POSTGRES_USER:?POSTGRES_USER must be set}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - DB_SCHEMA=public
      - PRAXIS_JPA_DDL_AUTO=validate
      - PRAXIS_INTEGRATION_TOKEN=${PRAXIS_INTEGRATION_TOKEN:?PRAXIS_INTEGRATION_TOKEN must be set}
      - PRAXIS_JWT_SECRET=${PRAXIS_JWT_SECRET:?PRAXIS_JWT_SECRET must be set}
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - praxis-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: praxis-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - praxis-network

  postgres:
    image: postgres:17-alpine
    container_name: praxis-postgres
    environment:
      - POSTGRES_DB=praxis
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER must be set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - praxis-network

volumes:
  postgres_data:

networks:
  praxis-network:
    driver: bridge
