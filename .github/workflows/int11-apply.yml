name: Apply INT11 separation

# Arquivo temporário removido automaticamente após a aplicação aprovada.
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/int11-separar-webhooks-20260715' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - run: echo "A aplicação é executada pelo workflow temporário aprovado na main."
