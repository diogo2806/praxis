name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-build:
    name: Backend — build deployable artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Suíte completa + empacotamento. Os testes de integração (@SpringBootTest,
      # @DataJpaTest) rodam contra PostgreSQL real via Testcontainers — as migrations
      # Flyway usam sintaxe exclusiva do PostgreSQL (ex.: índice parcial na V14),
      # incompatível com H2. O runner ubuntu-latest do GitHub já tem Docker, que o
      # Testcontainers usa para subir o container do Postgres automaticamente
      # (ver src/test/resources/application.properties, datasource jdbc:tc).
      - name: Build & test (verify)
        run: mvn -B -ntp verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports
          if-no-files-found: warn
          retention-days: 7

  frontend-build:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Instala a partir do package-lock (mesmo caminho do Dockerfile) e builda o app
      # (client + SSR + nitro). Garante que regressões de TypeScript/build do frontend não
      # passem sem alarme — antes o CI só cobria o backend.
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
