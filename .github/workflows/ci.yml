name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-api1-test:
    name: Apply API1 test contract patch
    if: ${{ !contains(github.event.head_commit.message || '', 'test: alinhar timeout ao contrato externo Gupy') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/api1-gupy-result-contract-20260715
          fetch-depth: 0

      - name: Update outdated timeout assertions
        shell: python
        run: |
          from pathlib import Path

          path = Path("backend/src/test/java/br/com/iforce/praxis/candidate/controller/CandidateAttemptControllerTest.java")
          text = path.read_text(encoding="utf-8")
          old = '''        mockMvc.perform(get("/test/result/" + resultId)
                          .header("Authorization", AUTHORIZATION)
                          .param("company_id", "empresa-123"))
                  .andExpect(status().isOk())
                  .andExpect(jsonPath("$.status").value("done"))
                  .andExpect(jsonPath("$.other_informations.timeout_count").value(1))
                  .andExpect(jsonPath("$.other_informations.situational_omission_count").value(1))
                  .andExpect(jsonPath("$.results[?(@.title=='Empatia')].score").value(org.hamcrest.Matchers.hasItem(50)));
          '''
          new = '''        CandidateAttemptEntity completedAttempt = candidateAttemptRepository.findById(attemptId)
                  .orElseThrow();
          assertThat(completedAttempt.getAnswers())
                  .anySatisfy(answer -> assertThat(answer.isTimedOut()).isTrue());

          mockMvc.perform(get("/test/result/" + resultId)
                          .header("Authorization", AUTHORIZATION)
                          .param("company_id", "empresa-123"))
                  .andExpect(status().isOk())
                  .andExpect(jsonPath("$.status").value("done"))
                  .andExpect(jsonPath("$.other_informations").doesNotExist())
                  .andExpect(jsonPath("$.reliabilityLevel").doesNotExist())
                  .andExpect(jsonPath("$.results[?(@.title=='Empatia')].score").value(org.hamcrest.Matchers.hasItem(50)));
          '''

          if old not in text:
              raise SystemExit("Trecho esperado não encontrado; patch não aplicado.")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")

      - name: Commit patch and restore workflows
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git rm -f .github/workflows/patch-api1-test.yml
          git add backend/src/test/java/br/com/iforce/praxis/candidate/controller/CandidateAttemptControllerTest.java .github/workflows/ci.yml
          git commit -m "test: alinhar timeout ao contrato externo Gupy"
          git push origin HEAD:refs/heads/fix/api1-gupy-result-contract-20260715

  compose-config:
    name: Docker Compose — config without legacy token
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: ci-postgres-password
      PRAXIS_JWT_SECRET: ci-jwt-secret-with-sufficient-length
    steps:
      - uses: actions/checkout@v4

      - name: Validate runtime configuration
        run: docker compose config --quiet

  backend-build:
    name: Backend — build deployable artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Suíte completa + empacotamento. Os testes de integração (@SpringBootTest,
      # @DataJpaTest) rodam contra PostgreSQL real via Testcontainers — as migrations
      # Flyway usam sintaxe exclusiva do PostgreSQL (ex.: índice parcial na V14),
      # incompatível com H2. O runner ubuntu-latest do GitHub já tem Docker, que o
      # Testcontainers usa para subir o container do Postgres automaticamente
      # (ver src/test/resources/application.properties, datasource jdbc:tc).
      - name: Build & test (verify)
        run: mvn -B -ntp verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports
          if-no-files-found: warn
          retention-days: 7

  frontend-build:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Instala a partir do package-lock (mesmo caminho do Dockerfile) e builda o app
      # (client + SSR + nitro). Garante que regressões de TypeScript/build do frontend não
      # passem sem alarme — antes o CI só cobria o backend.
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
