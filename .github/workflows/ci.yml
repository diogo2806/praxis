name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply-issue-473:
    name: Apply typed frontend fixes for issue 473
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'fix/issue-473-validacoes-frontend-ci' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-473-validacoes-frontend-ci
          fetch-depth: 0

      - name: Apply fixes
        shell: bash
        run: |
          base64 --decode scripts/issue-473.patch.gz.b64 | gzip --decompress > /tmp/issue-473.patch
          git apply --check /tmp/issue-473.patch
          git apply /tmp/issue-473.patch

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and format changed files
        working-directory: frontend
        shell: bash
        run: |
          npm ci
          mapfile -t files < <(git -C .. diff --name-only -- frontend | sed 's#^frontend/##')
          npx prettier --write "${files[@]}"

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend
          git commit -m "fix(frontend): corrige contratos detectados pelo typecheck"
          git push origin HEAD:fix/issue-473-validacoes-frontend-ci

  docs-validation:
    name: Documentation — links and Gupy governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate documentation
        run: python3 scripts/validate_docs.py

  compose-config:
    name: Docker Compose — config without legacy token
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: ci-postgres-password
      PRAXIS_JWT_SECRET: ci-jwt-secret-with-sufficient-length
    steps:
      - uses: actions/checkout@v4

      - name: Validate runtime configuration
        run: docker compose config --quiet

  backend-build:
    name: Backend — build deployable artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build & test (verify)
        shell: bash
        run: |
          set -o pipefail
          {
            echo "=== MIGRATIONS ==="
            find src/main/resources/db/migration -type f | sort
            if [ -d src/test/resources/db/migration ]; then
              find src/test/resources/db/migration -type f | sort
            fi
            echo "=== MAVEN ==="
          } | tee build.log
          mvn -B -ntp verify 2>&1 | tee -a build.log

      - name: Upload backend diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-diagnostics
          path: |
            backend/build.log
            backend/target/surefire-reports
          if-no-files-found: warn
          retention-days: 7

  frontend-build:
    name: Frontend — build, typecheck, lint & access control
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and generate route tree
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee frontend.log

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee -a frontend.log

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee -a frontend.log

      - name: Test access control
        shell: bash
        run: |
          set -o pipefail
          npm run test:access-control 2>&1 | tee -a frontend.log

      - name: Upload frontend diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-diagnostics
          path: |
            frontend/frontend.log
            frontend/src
            frontend/package.json
            frontend/tsconfig.json
            frontend/eslint.config.js
          if-no-files-found: warn
          retention-days: 7
