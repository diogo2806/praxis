name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-build:
    name: Backend — build deployable artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Suíte completa + empacotamento. Os testes de integração (@SpringBootTest,
      # @DataJpaTest) rodam contra PostgreSQL real via Testcontainers — as migrations
      # Flyway usam sintaxe exclusiva do PostgreSQL (ex.: índice parcial na V14),
      # incompatível com H2. O runner ubuntu-latest do GitHub já tem Docker, que o
      # Testcontainers usa para subir o container do Postgres automaticamente
      # (ver src/test/resources/application.properties, datasource jdbc:tc).
      - name: Build & test (verify)
        run: mvn -B -ntp verify
