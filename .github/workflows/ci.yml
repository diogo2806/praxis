name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-config:
    name: Docker Compose — config without legacy token
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: ci-postgres-password
      PRAXIS_JWT_SECRET: ci-jwt-secret-with-sufficient-length
    steps:
      - uses: actions/checkout@v4

      - name: Validate runtime configuration
        run: docker compose config --quiet

  backend-build:
    name: Backend — build deployable artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Suíte completa + empacotamento. O tee mantém um log integral mesmo quando
      # a compilação falha antes de o Surefire criar relatórios de teste.
      - name: Build & test (verify)
        shell: bash
        run: |
          set -o pipefail
          mvn -B -ntp verify 2>&1 | tee build.log

      - name: Upload backend diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-diagnostics
          path: |
            backend/build.log
            backend/target/surefire-reports
          if-no-files-found: warn
          retention-days: 7

  frontend-build:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
