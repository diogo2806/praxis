name: Aplicar conclusão da issue 500

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'feat/500-video-quality-completion-20260723' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Aplicar alterações
        run: |
          python3 -m py_compile scripts/apply_issue_500_completion.py
          python3 scripts/apply_issue_500_completion.py
      - name: Validar backend
        id: backend
        continue-on-error: true
        run: |
          cd backend
          mvn -B -Dtest=DashboardAnalyticsServiceTest,CandidateIntegrityServiceTest test > ../issue-500-backend.log 2>&1
      - name: Publicar diagnóstico backend
        if: steps.backend.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: issue-500-backend-diagnostics
          path: issue-500-backend.log
          retention-days: 2
      - name: Interromper após diagnóstico backend
        if: steps.backend.outcome == 'failure'
        run: exit 1
      - name: Validar frontend
        id: frontend
        continue-on-error: true
        run: |
          cd frontend
          npm ci > ../issue-500-frontend.log 2>&1
          npm run typecheck >> ../issue-500-frontend.log 2>&1
          npm run lint >> ../issue-500-frontend.log 2>&1
          node scripts/test-accessible-video.mjs >> ../issue-500-frontend.log 2>&1
          node scripts/test-screen-manuals.mjs >> ../issue-500-frontend.log 2>&1
      - name: Publicar diagnóstico frontend
        if: steps.frontend.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: issue-500-frontend-diagnostics
          path: issue-500-frontend.log
          retention-days: 2
      - name: Interromper após diagnóstico frontend
        if: steps.frontend.outcome == 'failure'
        run: exit 1
      - name: Limpar aplicadores
        run: |
          git rm -f scripts/apply_issue_500_completion.py
          git rm -f .github/workflows/apply-issue-500-completion.yml
          git rm -f .github/workflows/apply-issue-500-completion-v2.yml
          rm -rf scripts/__pycache__
          rm -f issue-500-backend.log issue-500-frontend.log
      - name: Commitar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(midia): concluir telemetria e qualidade por formato (#500)"
          git push origin HEAD:${{ github.head_ref }}
