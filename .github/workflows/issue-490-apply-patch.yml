name: Aplicar correção de acessibilidade da issue 490

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-patch:
    if: ${{ github.head_ref == 'fix/issue-490-descricao-acessivel-midias-v2' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Verificar se a correção já foi aplicada
        id: guard
        shell: bash
        run: |
          if git log -1 --pretty=%B | grep -Fq "fix(a11y): usa descrições acessíveis nas mídias"; then
            echo "apply=false" >> "$GITHUB_OUTPUT"
          else
            echo "apply=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Aplicar alterações e validar
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          route = Path("frontend/src/routes/candidato.tsx")
          text = route.read_text(encoding="utf-8")

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Padrão esperado uma vez, encontrado {count}: {old[:100]!r}")
              text = text.replace(old, new, 1)

          replace_once(
              "  mediaType,\n}: {\n  mediaUrl: string;\n  mediaType: MediaType | null;\n}) {",
              "  mediaType,\n  accessibleDescription,\n  audioLabel,\n}: {\n  mediaUrl: string;\n  mediaType: MediaType | null;\n  accessibleDescription?: string | null;\n  audioLabel: string;\n}) {",
          )
          replace_once(
              '        className="w-full"\n        onClick={(event) => event.stopPropagation()}',
              '        className="w-full"\n        aria-label={audioLabel}\n        onClick={(event) => event.stopPropagation()}',
          )
          replace_once('      alt="Mídia do atendimento"', '      alt={accessibleDescription?.trim() || ""}')
          replace_once(
              '<audio controls src={currentNode.audioDescricaoUrl}>\n                    Seu navegador não suporta áudio.\n                  </audio>',
              '<audio\n                    controls\n                    src={currentNode.audioDescricaoUrl}\n                    aria-label="Audiodescrição do cenário"\n                  >\n                    Seu navegador não suporta áudio.\n                  </audio>',
          )
          replace_once(
              '<CandidateMedia\n                    mediaUrl={currentNode.midiaUrl}\n                    mediaType={currentNode.tipoMidia ?? null}\n                  />',
              '<CandidateMedia\n                    mediaUrl={currentNode.midiaUrl}\n                    mediaType={currentNode.tipoMidia ?? null}\n                    accessibleDescription={currentNode.descricaoAcessivel}\n                    audioLabel="Áudio do cenário"\n                  />',
          )
          replace_once(
              '<audio controls src={option.audioDescricaoUrl}>\n                          Seu navegador não suporta áudio.\n                        </audio>',
              '<audio\n                          controls\n                          src={option.audioDescricaoUrl}\n                          aria-label={`Audiodescrição da alternativa ${OPTION_LETTERS[idx] ?? idx + 1}`}\n                        >\n                          Seu navegador não suporta áudio.\n                        </audio>',
          )
          replace_once(
              '<CandidateMedia\n                          mediaUrl={option.mediaUrl}\n                          mediaType={option.tipoMidia ?? null}\n                        />',
              '<CandidateMedia\n                          mediaUrl={option.mediaUrl}\n                          mediaType={option.tipoMidia ?? null}\n                          accessibleDescription={option.descricaoAcessivel}\n                          audioLabel={`Áudio da alternativa ${OPTION_LETTERS[idx] ?? idx + 1}`}\n                        />',
          )
          route.write_text(text, encoding="utf-8")

          test_file = Path("frontend/scripts/test-candidate-media-accessibility.mjs")
          test_file.write_text(
              '''import assert from "node:assert/strict";\nimport { readFile } from "node:fs/promises";\n\nconst source = await readFile(new URL("../src/routes/candidato.tsx", import.meta.url), "utf8");\n\nassert.match(source, /accessibleDescription\\?: string \\| null/);\nassert.match(source, /alt=\\{accessibleDescription\\?\\.trim\\(\\) \\|\\| ""\\}/);\nassert.match(source, /aria-label=\\{audioLabel\\}/);\nassert.match(source, /accessibleDescription=\\{currentNode\\.descricaoAcessivel\\}/);\nassert.match(source, /accessibleDescription=\\{option\\.descricaoAcessivel\\}/);\nassert.match(source, /aria-label="Audiodescrição do cenário"/);\nassert.match(source, /Audiodescrição da alternativa/);\nassert.doesNotMatch(source, /alt="Mídia do atendimento"/);\n\nconsole.log("Descrições acessíveis das mídias do candidato validadas.");\n''',
              encoding="utf-8",
          )

          package_file = Path("frontend/package.json")
          package_data = json.loads(package_file.read_text(encoding="utf-8"))
          package_data["scripts"]["test:candidate-media-a11y"] = "node scripts/test-candidate-media-accessibility.mjs"
          package_file.write_text(json.dumps(package_data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

          node frontend/scripts/test-candidate-media-accessibility.mjs
          git rm -f .github/issue-490-trigger.txt
          git rm .github/workflows/issue-490-apply-patch.yml

      - name: Registrar correção
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(a11y): usa descrições acessíveis nas mídias"
          git push origin HEAD:${{ github.head_ref }}
