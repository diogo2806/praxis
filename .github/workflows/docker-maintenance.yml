name: Docker maintenance validation

on:
  pull_request:
    branches: [main]
    paths:
      - backend/Dockerfile
      - frontend/Dockerfile
      - scripts/docker-disk-cleanup.sh
      - scripts/install-docker-cleanup-timer.sh
      - docs/MANUTENCAO-DOCKER.md
      - .github/workflows/docker-maintenance.yml
  push:
    branches: [main]
    paths:
      - backend/Dockerfile
      - frontend/Dockerfile
      - scripts/docker-disk-cleanup.sh
      - scripts/install-docker-cleanup-timer.sh
      - docs/MANUTENCAO-DOCKER.md
      - .github/workflows/docker-maintenance.yml
  workflow_dispatch:
    inputs:
      retention_hours:
        description: Retenção mínima dos recursos Docker sem uso, em horas
        required: true
        default: '24'
        type: string
      confirmation:
        description: Digite EXECUTAR para confirmar a manutenção na VPS de produção
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate Docker maintenance safeguards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell syntax
        run: |
          sh -n scripts/docker-disk-cleanup.sh
          sh -n scripts/install-docker-cleanup-timer.sh

      - name: Protect persistent volumes
        run: |
          if grep -R -E 'docker[[:space:]]+volume[[:space:]]+prune|docker[[:space:]]+system[[:space:]]+prune.*--volumes' scripts/docker-disk-cleanup.sh scripts/install-docker-cleanup-timer.sh; then
            echo 'A rotina de manutenção não pode remover volumes.' >&2
            exit 1
          fi

      - name: Reject persistent package-manager cache mounts
        run: |
          if grep -n -- '--mount=type=cache' backend/Dockerfile frontend/Dockerfile; then
            echo 'Caches persistentes do Maven/npm não são permitidos nos Dockerfiles de produção.' >&2
            exit 1
          fi

      - name: Validate Dockerfile syntax
        run: |
          docker build --check backend
          docker build --check frontend

  maintain-vps:
    name: Execute maintenance on production VPS
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: praxis-docker-maintenance-production
      cancel-in-progress: false
    env:
      VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST || vars.VPS_SSH_HOST }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || vars.VPS_SSH_PORT || '22' }}
      VPS_SSH_USER: ${{ secrets.VPS_SSH_USER || vars.VPS_SSH_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
      BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL || vars.BACKEND_HEALTH_URL }}
      FRONTEND_HEALTH_URL: ${{ secrets.FRONTEND_HEALTH_URL || vars.FRONTEND_HEALTH_URL }}
      RETENTION_HOURS: ${{ inputs.retention_hours }}
      CONFIRMATION: ${{ inputs.confirmation }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate protected execution inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" != 'refs/heads/main' ]]; then
            echo 'A manutenção remota somente pode ser executada a partir da branch main.' >&2
            exit 1
          fi

          if [[ "$CONFIRMATION" != 'EXECUTAR' ]]; then
            echo 'Confirmação inválida. Digite exatamente EXECUTAR.' >&2
            exit 1
          fi

          missing=0
          for variable_name in \
            VPS_SSH_HOST \
            VPS_SSH_USER \
            VPS_SSH_PRIVATE_KEY \
            VPS_SSH_KNOWN_HOSTS \
            BACKEND_HEALTH_URL \
            FRONTEND_HEALTH_URL
          do
            if [[ -z "${!variable_name:-}" ]]; then
              echo "Configuração obrigatória ausente: ${variable_name}" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          if [[ ! "$VPS_SSH_PORT" =~ ^[0-9]+$ ]] || (( VPS_SSH_PORT < 1 || VPS_SSH_PORT > 65535 )); then
            echo 'VPS_SSH_PORT deve ser um número entre 1 e 65535.' >&2
            exit 1
          fi

          if [[ ! "$RETENTION_HOURS" =~ ^[0-9]+$ ]] || (( RETENTION_HOURS < 1 )); then
            echo 'retention_hours deve ser um número inteiro maior ou igual a 1.' >&2
            exit 1
          fi

          for health_url in "$BACKEND_HEALTH_URL" "$FRONTEND_HEALTH_URL"; do
            case "$health_url" in
              http://*|https://*) ;;
              *)
                echo 'Os endpoints de saúde devem usar HTTP ou HTTPS.' >&2
                exit 1
                ;;
            esac
          done

          echo "::add-mask::$VPS_SSH_HOST"
          echo "::add-mask::$VPS_SSH_USER"
          echo "::add-mask::$BACKEND_HEALTH_URL"
          echo "::add-mask::$FRONTEND_HEALTH_URL"

      - name: Configure verified SSH connection
        shell: bash
        run: |
          set -euo pipefail

          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/praxis-vps-key"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$RUNNER_TEMP/praxis-known-hosts"
          chmod 0600 "$RUNNER_TEMP/praxis-vps-key" "$RUNNER_TEMP/praxis-known-hosts"

          cat > "$RUNNER_TEMP/praxis-ssh-config" <<EOF
          Host praxis-vps
            HostName $VPS_SSH_HOST
            Port $VPS_SSH_PORT
            User $VPS_SSH_USER
            IdentityFile $RUNNER_TEMP/praxis-vps-key
            UserKnownHostsFile $RUNNER_TEMP/praxis-known-hosts
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            ConnectTimeout 20
          EOF
          chmod 0600 "$RUNNER_TEMP/praxis-ssh-config"

          ssh -F "$RUNNER_TEMP/praxis-ssh-config" praxis-vps 'printf "Conexão SSH validada.\n"'

      - name: Upload maintenance scripts and protected parameters
        shell: bash
        run: |
          set -euo pipefail

          remote_dir="/tmp/praxis-docker-maintenance-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "REMOTE_DIR=$remote_dir" >> "$GITHUB_ENV"

          printf '%s' "$RETENTION_HOURS" > "$RUNNER_TEMP/retention-hours"
          printf '%s' "$BACKEND_HEALTH_URL" > "$RUNNER_TEMP/backend-health-url"
          printf '%s' "$FRONTEND_HEALTH_URL" > "$RUNNER_TEMP/frontend-health-url"
          chmod 0600 \
            "$RUNNER_TEMP/retention-hours" \
            "$RUNNER_TEMP/backend-health-url" \
            "$RUNNER_TEMP/frontend-health-url"

          ssh -F "$RUNNER_TEMP/praxis-ssh-config" praxis-vps \
            "umask 077 && rm -rf '$remote_dir' && mkdir -p '$remote_dir'"

          scp -q -F "$RUNNER_TEMP/praxis-ssh-config" \
            scripts/docker-disk-cleanup.sh \
            scripts/install-docker-cleanup-timer.sh \
            "$RUNNER_TEMP/retention-hours" \
            "$RUNNER_TEMP/backend-health-url" \
            "$RUNNER_TEMP/frontend-health-url" \
            "praxis-vps:$remote_dir/"

      - name: Execute cleanup, install timer and validate services
        shell: bash
        run: |
          set -euo pipefail

          ssh -F "$RUNNER_TEMP/praxis-ssh-config" praxis-vps \
            "REMOTE_DIR='$REMOTE_DIR' sh -s" 2>&1 <<'REMOTE_SCRIPT' | tee "$RUNNER_TEMP/docker-maintenance-evidence.log"
          set -eu

          cleanup_remote_files() {
              rm -rf "$REMOTE_DIR"
          }
          trap cleanup_remote_files EXIT HUP INT TERM

          RETENTION_HOURS=$(cat "$REMOTE_DIR/retention-hours")
          BACKEND_HEALTH_URL=$(cat "$REMOTE_DIR/backend-health-url")
          FRONTEND_HEALTH_URL=$(cat "$REMOTE_DIR/frontend-health-url")

          for command_name in docker systemctl journalctl curl sudo; do
              if ! command -v "$command_name" >/dev/null 2>&1; then
                  echo "Comando obrigatório indisponível na VPS: $command_name" >&2
                  exit 1
              fi
          done

          if ! sudo -n true >/dev/null 2>&1; then
              echo 'O usuário SSH precisa de sudo não interativo para executar a manutenção.' >&2
              exit 1
          fi

          if ! sudo -n docker info >/dev/null 2>&1; then
              echo 'O daemon Docker não está acessível na VPS.' >&2
              exit 1
          fi

          show_evidence() {
              phase="$1"
              echo
              echo "===== $phase ====="
              if [ -d /var/lib/docker ]; then
                  df -h /var/lib/docker || true
              else
                  df -h / || true
              fi
              echo
              sudo -n docker system df || true
              echo
              sudo -n docker ps --no-trunc || true
          }

          check_endpoint() {
              label="$1"
              url="$2"
              status_code=$(curl \
                  --location \
                  --silent \
                  --output /dev/null \
                  --write-out '%{http_code}' \
                  --connect-timeout 10 \
                  --max-time 30 \
                  "$url" 2>/dev/null) || status_code='000'

              case "$status_code" in
                  2*|3*)
                      echo "$label: ATIVO (HTTP $status_code)"
                      return 0
                      ;;
                  *)
                      echo "$label: INDISPONÍVEL (HTTP $status_code)" >&2
                      return 1
                      ;;
              esac
          }

          show_evidence 'ANTES DA LIMPEZA'

          echo
          echo '===== EXECUÇÃO DA LIMPEZA SEGURA ====='
          sudo -n env \
              DOCKER_CLEANUP_RETENTION_HOURS="$RETENTION_HOURS" \
              sh "$REMOTE_DIR/docker-disk-cleanup.sh"

          echo
          echo '===== INSTALAÇÃO OU ATUALIZAÇÃO DO TIMER ====='
          sudo -n env \
              DOCKER_CLEANUP_RETENTION_HOURS="$RETENTION_HOURS" \
              DOCKER_CLEANUP_RUN_NOW=0 \
              sh "$REMOTE_DIR/install-docker-cleanup-timer.sh"

          show_evidence 'DEPOIS DA LIMPEZA'

          echo
          echo '===== TIMER DO SYSTEMD ====='
          timer_failed=0
          if sudo -n systemctl is-enabled --quiet praxis-docker-disk-cleanup.timer; then
              echo 'Timer habilitado: SIM'
          else
              echo 'Timer habilitado: NÃO' >&2
              timer_failed=1
          fi

          if sudo -n systemctl is-active --quiet praxis-docker-disk-cleanup.timer; then
              echo 'Timer ativo: SIM'
          else
              echo 'Timer ativo: NÃO' >&2
              timer_failed=1
          fi

          sudo -n systemctl status \
              --no-pager \
              --full \
              praxis-docker-disk-cleanup.timer || true
          sudo -n systemctl list-timers \
              --all \
              --no-pager \
              praxis-docker-disk-cleanup.timer || true

          echo
          echo '===== JOURNAL DA MANUTENÇÃO ====='
          sudo -n journalctl \
              -u praxis-docker-disk-cleanup.service \
              --since '24 hours ago' \
              --no-pager \
              -n 200 || true

          echo
          echo '===== ENDPOINTS DE SAÚDE ====='
          health_failed=0
          check_endpoint 'Backend' "$BACKEND_HEALTH_URL" || health_failed=1
          check_endpoint 'Frontend' "$FRONTEND_HEALTH_URL" || health_failed=1

          if [ "$timer_failed" -ne 0 ] || [ "$health_failed" -ne 0 ]; then
              echo 'A manutenção terminou, mas uma ou mais validações obrigatórias falharam.' >&2
              exit 1
          fi

          echo
          echo 'Manutenção e validações concluídas com sucesso.'
          REMOTE_SCRIPT

      - name: Publish maintenance evidence
        if: always()
        shell: bash
        run: |
          {
            echo '## Manutenção Docker da VPS'
            echo
            echo "- Repositório/ref: \`$GITHUB_REPOSITORY@$GITHUB_REF_NAME\`"
            echo "- Execução: \`$GITHUB_RUN_ID\` tentativa \`$GITHUB_RUN_ATTEMPT\`"
            echo "- Retenção informada: \`${RETENTION_HOURS} hora(s)\`"
            echo
            echo '### Evidências coletadas'
            echo
            echo '```text'
            if [[ -s "$RUNNER_TEMP/docker-maintenance-evidence.log" ]]; then
              tail -c 100000 "$RUNNER_TEMP/docker-maintenance-evidence.log"
            else
              echo 'A execução remota não produziu evidências. Verifique as etapas de conexão e upload.'
            fi
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove temporary credentials and files
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -n "${REMOTE_DIR:-}" && -f "$RUNNER_TEMP/praxis-ssh-config" ]]; then
            ssh -F "$RUNNER_TEMP/praxis-ssh-config" praxis-vps \
              "rm -rf '$REMOTE_DIR'" >/dev/null 2>&1
          fi
          rm -f \
            "$RUNNER_TEMP/praxis-vps-key" \
            "$RUNNER_TEMP/praxis-known-hosts" \
            "$RUNNER_TEMP/praxis-ssh-config" \
            "$RUNNER_TEMP/retention-hours" \
            "$RUNNER_TEMP/backend-health-url" \
            "$RUNNER_TEMP/frontend-health-url"
