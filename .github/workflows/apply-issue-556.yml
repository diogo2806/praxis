name: Aplicar correção da issue 556

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-fix:
    if: ${{ github.head_ref == 'fix/556-gupy-canonical-urls-20260723' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Corrigir URLs provisórias e validar documentação
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("docs/GUPY-FONTE-CANONICA.md")
          content = path.read_text(encoding="utf-8")
          replacements = [
              (
                  r"https://developers\.gupy\.io/docs/configurando-webhooks-e-obtendo-payloads-reais-(?![A-Za-z0-9])",
                  "https://developers.gupy.io/v2.0/docs/configurando-webhooks-e-obtendo-payloads-reais",
                  2,
              ),
              (
                  r"https://developers\.gupy\.io/docs/fluxo-de-admiss%C3%A3o-para-sistema-de-folha-(?![A-Za-z0-9])",
                  "https://developers.gupy.io/v2.0/docs/fluxo-de-admiss%C3%A3o-para-sistema-de-folha",
                  1,
              ),
          ]
          for pattern, target, expected in replacements:
              content, count = re.subn(pattern, target, content)
              if count != expected:
                  raise SystemExit(f"Quantidade inesperada para {pattern}: {count}")
          path.write_text(content, encoding="utf-8")
          PY
          python3 scripts/validate_docs.py
          git rm .github/workflows/apply-issue-556.yml

      - name: Registrar correção
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(docs): remover URLs provisórias da fonte Gupy (#556)"
          git push origin HEAD:${{ github.head_ref }}
