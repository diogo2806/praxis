name: Fix Gupy callback implementation

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix-implementation:
    if: github.head_ref == 'feat/gupy-callback-job-redirect-20260715-02'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/gupy-callback-job-redirect-20260715-02
          fetch-depth: 1
          show-progress: false

      - name: Apply final fixes
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          output=$(python .github/scripts/fix_gupy_callback_implementation.py 2>&1)
          status=$?
          if [ "$status" -ne 0 ]; then
            printf -v body 'Falha nos ajustes finais do callback Gupy:\n\n```text\n%s\n```' "$output"
            gh pr comment "$PR_NUMBER" --body "$body"
            exit "$status"
          fi
          printf '%s\n' "$output"

      - name: Remove temporary files
        run: |
          rm .github/scripts/fix_gupy_callback_implementation.py
          rm .github/workflows/fix-gupy-callback-implementation.yml

      - name: Commit final fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preservar provedores e alinhar retorno Gupy"
          git push origin HEAD:feat/gupy-callback-job-redirect-20260715-02
