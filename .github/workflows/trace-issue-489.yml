name: Aplicar issue 489 com diagnóstico

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/issue-489-traduzir-execucao-candidato
          fetch-depth: 1
          show-progress: false

      - name: Aplicar e registrar resultado
        env:
          SCRIPT_B64: >-
            
        run: |
          set +e
          python - <<'PY' > .github/issue-489-error.txt 2>&1
          import base64
          import gzip
          import os

          source = gzip.decompress(base64.b64decode(os.environ["SCRIPT_B64"])).decode("utf-8")
          exec(compile(source, "apply_issue_489.py", "exec"), {"__name__": "__main__"})
          PY
          status=$?
          set -e
          cat .github/issue-489-error.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            git add .github/issue-489-error.txt
            git commit -m "chore: registrar diagnóstico real da issue #489"
            git push
            exit 0
          fi

          rm -f .github/issue-489-error.txt
          cd frontend
          node scripts/test-candidate-i18n.mjs
          cd ..
          git diff --check
          rm -f .github/workflows/trace-issue-489.yml
          git add -A
          git commit -m "fix(frontend): traduzir execução da avaliação do candidato"
          git push
