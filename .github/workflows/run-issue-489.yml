name: Aplicar correção da issue 489

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: macos-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: fix/issue-489-i18n-execucao-candidato
          fetch-depth: 1
          show-progress: false

      - name: Aplicar, validar e publicar
        run: |
          set +e
          python - <<'PY' > .github/issue-489-error.txt 2>&1
          import base64
          import gzip
          import hashlib
          from pathlib import Path

          parts = sorted(Path('.github/issue-489-parts-v2').glob('part-*.txt'))
          assert len(parts) == 9, f'Esperadas 9 partes, encontradas {len(parts)}'
          encoded = ''.join(path.read_text(encoding='utf-8').strip() for path in parts)
          assert len(encoded) == 12420, f'Tamanho inválido do payload: {len(encoded)}'
          digest = hashlib.sha256(encoded.encode('utf-8')).hexdigest()
          assert digest == 'd07ff459443c894473a66ae7928f218f23a92425999a82b0515bf6dbb8dbd627', f'Hash inválido: {digest}'
          source = gzip.decompress(base64.b64decode(encoded)).decode('utf-8')
          exec(compile(source, 'apply_issue_489.py', 'exec'), {'__name__': '__main__'})
          PY
          status=$?
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            cat .github/issue-489-error.txt
            git add .github/issue-489-error.txt
            git commit -m "chore: registrar diagnóstico da correção #489"
            git push
            exit 0
          fi

          rm -f .github/issue-489-error.txt
          cd frontend
          node scripts/test-candidate-i18n.mjs
          cd ..
          git diff --check

          rm -rf .github/issue-489-parts
          rm -rf .github/issue-489-parts-v2
          rm -f .github/workflows/run-issue-489.yml

          git add -A
          git commit -m "fix(frontend): traduzir execução da avaliação do candidato"
          git push
