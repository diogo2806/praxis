              '| `previous_result` | Não | Aceita `fail`, ausência ou JSON `null`. `null` identifica o ciclo inicial; `fail` autoriza o ciclo de reteste somente quando a tentativa inicial está `COMPLETED`, `ABANDONED` ou `EXPIRED`. |'
          )
          old_idempotency = '''A idempotência usa o hash de:

```text
empresaId | companyId decimal canônico | documentId decimal canônico | testId | jobId (quando informado)
```

Como os identificadores são desserializados como `Long` e convertidos uma única vez com `Long.toString`, chamadas equivalentes não produzem identidades distintas por espaços, sinal positivo, zeros à esquerda ou outra representação textual. Chamadas repetidas com a mesma combinação reutilizam a tentativa existente; vagas diferentes continuam produzindo tentativas distintas.'''
          new_idempotency = '''A idempotência separa identidade da solicitação e autorização de reteste. O ciclo inicial preserva a chave histórica calculada sobre:

```text
empresaId | companyId decimal canônico | documentId decimal canônico | testId | jobId (quando informado)
```

Quando `previous_result=fail`, o backend acrescenta um marcador contratual de ciclo antes do hash. Assim, o reteste possui chave diferente da tentativa inicial, mas todas as repetições equivalentes do mesmo reteste continuam usando exatamente a mesma chave.

A política aceita `fail` somente quando a tentativa inicial da mesma empresa, pessoa candidata, avaliação e vaga está em `COMPLETED`, `ABANDONED` ou `EXPIRED`. Estados `NOT_STARTED` e `IN_PROGRESS` retornam `409`, assim como um pedido de reteste sem tentativa anterior. A restrição impede avaliações paralelas e mantém a criação concorrente protegida pela unicidade de `idempotency_key`.

O fingerprint versão 2 não contém `previous_result`: esse campo autoriza a transição de ciclo e já está representado na chave. Nome, e-mail, destinos, vaga, avaliação, tipo de candidato e acomodação continuam protegidos contra divergência dentro do mesmo ciclo. Fingerprints versão 1 permanecem verificáveis e são atualizados após uma repetição equivalente.

Como o contrato publicado pela Gupy oferece apenas `null` e `fail`, a política representa dois ciclos determinísticos por identidade: inicial e reteste. Uma extensão futura para ciclos adicionais exige identificador contratual explícito de aplicação/ciclo.

Como os identificadores são desserializados como `Long` e convertidos uma única vez com `Long.toString`, chamadas equivalentes não produzem identidades distintas por espaços, sinal positivo, zeros à esquerda ou outra representação textual. Vagas diferentes continuam produzindo tentativas distintas.'''
          assert old_idempotency in integration, 'integration idempotency section not found'
          integration_path.write_text(integration.replace(old_idempotency, new_idempotency, 1), encoding='utf-8')

          pending_path = root / 'docs/requisitos/requisito-tecnico.md'
          pending = pending_path.read_text(encoding='utf-8')
          pending = re.sub(r'^\| `DATA13` \|.*\n', '', pending, flags=re.MULTILINE)
          pending = re.sub(r'\n### DATA13 — reteste Gupy versus repetição idempotente\n.*?(?=\n### DATA14)', '\n', pending, flags=re.DOTALL)
          pending = pending.replace('4. `DATA13` — separar reteste legítimo de repetição idempotente.\n5. `DATA14`', '4. `DATA14`')
          pending = pending.replace('6. `BUS12`', '5. `BUS12`').replace('7. `UI13`', '6. `UI13`').replace('8. `BUS13`', '7. `BUS13`')
          pending_path.write_text(pending, encoding='utf-8')

          implemented_path = root / 'docs/implementados/requisitos-implementados.md'
          implemented = implemented_path.read_text(encoding='utf-8')
          old_api2 = '| `API2` | Concluído no escopo de repetição equivalente | A criação Gupy persiste fingerprint versionado, preserva a tentativa em repetições equivalentes e retorna `409` para conteúdo divergente sob a mesma identidade idempotente. | `DATA13` deve separar divergência indevida de uma nova aplicação ou reteste legitimamente autorizado. |'
          new_rows = '| `DATA13` | Concluído | A chave idempotente distingue o ciclo inicial do ciclo autorizado por `previous_result=fail`; o reteste exige tentativa anterior terminal, repetições equivalentes reutilizam o mesmo resultado e a restrição única impede duplicidade concorrente. | Nenhuma para o reteste contratual Gupy; ciclos adicionais exigem futuro identificador explícito da Gupy. |\n| `API2` | Concluído | A criação Gupy persiste fingerprint versionado, preserva a tentativa em repetições equivalentes e retorna `409` para conteúdo divergente dentro do mesmo ciclo. | Nenhuma para repetição idempotente e reteste contratual. |'
          assert old_api2 in implemented, 'API2 row not found'
          implemented = implemented.replace(old_api2, new_rows, 1)
          old_behavior = '| `backend/src/main/java/br/com/iforce/praxis/gupy/service/CandidateAttemptIdempotencyAspect.java` | `enforceEquivalentRetry()` | Bloqueia fingerprint divergente sob a mesma chave; a ausência de um conceito de novo ciclo permanece em `DATA13`. |'
          new_behavior = '| `backend/src/main/java/br/com/iforce/praxis/gupy/service/CandidateAttemptIdempotencyAspect.java` | `enforceEquivalentRetry()` | Separa ciclo inicial e reteste Gupy, exige estado anterior terminal, valida fingerprints versão 1 e 2 e mantém repetições equivalentes no mesmo resultado. |'
          assert old_behavior in implemented, 'implemented behavior row not found'
          implemented_path.write_text(implemented.replace(old_behavior, new_behavior, 1), encoding='utf-8')
          PY

      - name: Run focused backend tests
        working-directory: backend
        run: mvn -q -Dtest=CandidateAttemptIdempotencyAspectTest,CreateCandidateRequestTest test

