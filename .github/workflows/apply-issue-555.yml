name: Aplicar correção da issue 555

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-fix:
    if: ${{ github.head_ref == 'fix/555-vaul-version-20260723' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Corrigir e validar dependência
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          package = Path("frontend/package.json")
          content = package.read_text(encoding="utf-8")
          expected = '"vaul": "^1.2.2"'
          if expected not in content:
              raise SystemExit("Versão inválida esperada de vaul não encontrada")
          package.write_text(content.replace(expected, '"vaul": "1.1.2"', 1), encoding="utf-8")
          PY
          cd frontend
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run build
          npm run typecheck
          npm run lint
          cd ..
          git rm .github/workflows/apply-issue-555.yml

      - name: Registrar correção
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(frontend): usar versão publicada do vaul (#555)"
          git push origin HEAD:${{ github.head_ref }}
