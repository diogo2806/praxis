name: Aplicar vídeo acessível da issue 500

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-patch:
    if: ${{ github.head_ref == 'feat/500-video-acessivel-20260723' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Verificar se a implementação ainda precisa ser aplicada
        id: guard
        shell: bash
        run: |
          if [ -f scripts/apply_issue_500.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Aplicar alterações e validar contrato mínimo
        id: apply
        if: steps.guard.outputs.apply == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/apply_issue_500.py")
          source = path.read_text(encoding="utf-8")
          old = '''replace_all(
              duplicate,
              "        target.setMediaType(source.getMediaType());",
              "        target.setMediaType(source.getMediaType());\\n"
              "        target.setMediaTranscript(source.getMediaTranscript());\\n"
              "        target.setMediaCaptionsUrl(source.getMediaCaptionsUrl());\\n"
              "        target.setMediaVersion(source.getMediaVersion());",
          )
          '''
          new = '''replace_once(
              duplicate,
              "        targetNode.setMediaType(sourceNode.getMediaType());",
              "        targetNode.setMediaType(sourceNode.getMediaType());\\n"
              "        targetNode.setMediaTranscript(sourceNode.getMediaTranscript());\\n"
              "        targetNode.setMediaCaptionsUrl(sourceNode.getMediaCaptionsUrl());\\n"
              "        targetNode.setMediaVersion(sourceNode.getMediaVersion());",
          )
          replace_once(
              duplicate,
              "        targetOption.setMediaType(sourceOption.getMediaType());",
              "        targetOption.setMediaType(sourceOption.getMediaType());\\n"
              "        targetOption.setMediaTranscript(sourceOption.getMediaTranscript());\\n"
              "        targetOption.setMediaCaptionsUrl(sourceOption.getMediaCaptionsUrl());\\n"
              "        targetOption.setMediaVersion(sourceOption.getMediaVersion());",
          )
          '''
          if old not in source:
              raise SystemExit("Bloco de duplicação esperado não encontrado no aplicador")
          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          PY
            python3 -m py_compile scripts/apply_issue_500.py &&
            python3 scripts/apply_issue_500.py &&
            node frontend/scripts/test-accessible-video.mjs &&
            git rm scripts/apply_issue_500.py &&
            git rm .github/workflows/apply-issue-500.yml
          } > apply-issue-500.log 2>&1
          status=$?
          cat apply-issue-500.log
          exit $status

      - name: Publicar diagnóstico do aplicador
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: apply-issue-500-diagnostics
          path: apply-issue-500.log
          retention-days: 2

      - name: Interromper após diagnóstico
        if: steps.apply.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Registrar implementação
        if: steps.guard.outputs.apply == 'true' && steps.apply.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(midia): adicionar vídeo acessível e equivalência (#500)"
          git push origin HEAD:${{ github.head_ref }}
