name: Aplicar vídeo acessível da issue 500

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-patch:
    if: ${{ github.head_ref == 'feat/500-video-acessivel-20260723' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Verificar se a implementação ainda precisa ser aplicada
        id: guard
        shell: bash
        run: |
          if [ -f scripts/apply_issue_500.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Aplicar alterações e validar contrato mínimo
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          python3 -m py_compile scripts/apply_issue_500.py
          python3 scripts/apply_issue_500.py
          node frontend/scripts/test-accessible-video.mjs
          git rm scripts/apply_issue_500.py
          git rm .github/workflows/apply-issue-500.yml

      - name: Registrar implementação
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(midia): adicionar vídeo acessível e equivalência (#500)"
          git push origin HEAD:${{ github.head_ref }}
