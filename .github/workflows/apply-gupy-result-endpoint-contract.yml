name: Apply Gupy result endpoint contract

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply-contract:
    if: github.head_ref == 'fix/gupy-result-endpoint-contract-20260715-01'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/gupy-result-endpoint-contract-20260715-01
          fetch-depth: 0

      - name: Apply source changes
        run: python .github/scripts/apply_gupy_result_endpoint_contract.py

      - name: Remove temporary automation
        run: |
          rm .github/scripts/apply_gupy_result_endpoint_contract.py
          rm .github/workflows/apply-gupy-result-endpoint-contract.yml
          rm .github/RESULT_ENDPOINT_PR_DRAFT.md

      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: alinhar endpoint de resultado ao contrato Gupy"
          git push origin HEAD:fix/gupy-result-endpoint-contract-20260715-01
