name: Aplicar correção da issue 563

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-fix:
    if: ${{ github.head_ref == 'fix/563-integrity-review-injection-20260723' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Corrigir injeção e validar testes de integridade
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          service = Path("backend/src/main/java/br/com/iforce/praxis/integrity/service/IntegrityReviewService.java")
          content = service.read_text(encoding="utf-8")
          import_anchor = "import org.springframework.beans.factory.annotation.Value;"
          constructor_anchor = "    public IntegrityReviewService("
          if import_anchor not in content or constructor_anchor not in content:
              raise SystemExit("Pontos de alteração do serviço não encontrados")
          content = content.replace(
              import_anchor,
              "import org.springframework.beans.factory.annotation.Autowired;\n" + import_anchor,
              1,
          )
          content = content.replace(
              constructor_anchor,
              "    @Autowired\n" + constructor_anchor,
              1,
          )
          service.write_text(content, encoding="utf-8")

          test = Path("backend/src/test/java/br/com/iforce/praxis/integrity/service/IntegrityReviewServiceTest.java")
          content = test.read_text(encoding="utf-8")
          test_import_anchor = "import org.mockito.junit.jupiter.MockitoExtension;"
          test_anchor = "    @Test\n    void requiresTextualJustification() {"
          if test_import_anchor not in content or test_anchor not in content:
              raise SystemExit("Pontos de alteração do teste não encontrados")
          content = content.replace(
              test_import_anchor,
              test_import_anchor + "\nimport org.springframework.beans.factory.annotation.Autowired;",
              1,
          )
          regression_test = '''    @Test
          void declaresProductionConstructorForSpringInjection() {
              assertThat(IntegrityReviewService.class.getConstructors()).hasSize(1);
              assertThat(IntegrityReviewService.class.getConstructors()[0].isAnnotationPresent(Autowired.class)).isTrue();
          }

          '''
          content = content.replace(test_anchor, regression_test + test_anchor, 1)
          test.write_text(content, encoding="utf-8")
          PY
          cd backend
          mvn -B -Dtest=IntegrityReviewServiceTest test
          cd ..
          git rm .github/workflows/apply-issue-563.yml

      - name: Registrar correção
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(backend): declarar construtor injetável da revisão de integridade (#563)"
          git push origin HEAD:${{ github.head_ref }}
