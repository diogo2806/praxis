name: Refresh frontend lockfile (temporary)

on:
  push:
    branches:
      - fix/eslint-react-hooks-compat-20260721

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/eslint-react-hooks-compat-20260721

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Refresh npm lockfile
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --fund=false

      - name: Commit regenerated lockfile and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/refresh-frontend-lock-temporary.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json .github/workflows/refresh-frontend-lock-temporary.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(frontend): regenerar package-lock compatível"
          git push origin HEAD:fix/eslint-react-hooks-compat-20260721
