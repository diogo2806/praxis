name: Aplicar manual da issue 569

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'fix/569-suboperadores-manual-20260723' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Adicionar manual contextual
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("frontend/src/lib/screen-manual-overrides.ts")
          source = path.read_text(encoding="utf-8")
          anchor = "export const SCREEN_MANUAL_OVERRIDES: ScreenManualDefinition[] = [\n"
          manual = '''  {
    id: "suboperadores-governanca",
    title: "Suboperadores de dados",
    purpose: "Dar transparência aos fornecedores que tratam dados pessoais em nome do Práxis e apoiar a governança de privacidade da organização.",
    flow: [
      "Revise a lista pública de suboperadores e as respectivas finalidades.",
      "Consulte o país ou região de tratamento e a categoria de dados envolvida.",
      "Abra os links de privacidade e segurança quando precisar avaliar um fornecedor.",
      "Use o canal de contato informado para dúvidas, objeções ou solicitações de privacidade.",
    ],
    fields: [
      { name: "Suboperador", description: "Fornecedor contratado para executar uma atividade técnica ou operacional." },
      { name: "Finalidade", description: "Motivo específico pelo qual o fornecedor participa do tratamento." },
      { name: "Localização", description: "País ou região principal em que os dados são processados ou armazenados." },
      { name: "Dados envolvidos", description: "Categorias de dados pessoais que podem ser tratadas pelo fornecedor." },
      { name: "Links", description: "Políticas oficiais de privacidade e segurança do suboperador." },
    ],
    permissions: [
      "A página é pública e pode ser consultada sem autenticação.",
      "A manutenção da lista exige responsabilidade administrativa e jurídica da controladora do Práxis.",
    ],
    states: ["Lista publicada", "Lista atualizada", "Fornecedor substituído", "Link externo indisponível"],
    blocks: [
      "Falha temporária ao abrir a política externa do fornecedor.",
      "Conteúdo do site externo alterado ou indisponível.",
      "Solicitação que exige análise do canal de privacidade.",
    ],
    examples: [
      "Verificar onde a infraestrutura de hospedagem processa os dados.",
      "Consultar quais categorias de dados são enviadas ao provedor de e-mail transacional.",
    ],
    shortcuts: [
      "Use Tab para navegar entre os links da tabela.",
      "Os links externos abrem em nova guia.",
      "Consulte Privacidade e Termos para o processo completo de tratamento de dados.",
      "Use contato@iforce.com.br para solicitações relacionadas à privacidade.",
    ],
    matches: (pathname) => pathname === "/suboperadores",
  },
'''
          if anchor not in source:
              raise SystemExit("Lista de manuais não localizada")
          if 'pathname === "/suboperadores"' in source:
              raise SystemExit("Manual de suboperadores já existe")
          path.write_text(source.replace(anchor, anchor + manual, 1), encoding="utf-8")
          PY
      - name: Validar frontend e manuais
        run: |
          cd frontend
          npm ci
          npm run build
          npm run typecheck
          npx eslint src/lib/screen-manual-overrides.ts src/routes/suboperadores.tsx
          node scripts/test-screen-manuals.mjs
      - name: Limpar e registrar
        run: |
          git rm .github/workflows/apply-issue-569.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(frontend): adicionar manual de suboperadores (#569)"
          git push origin HEAD:${{ github.head_ref }}
