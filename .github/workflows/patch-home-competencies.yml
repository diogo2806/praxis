name: Aplicar correção das competências na home

on:
  push:
    branches:
      - fix/home-competencias-sem-abreviacao-20260719

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Baixar branch
        uses: actions/checkout@v4
        with:
          ref: fix/home-competencias-sem-abreviacao-20260719
          fetch-depth: 0

      - name: Substituir abreviações pelos nomes completos
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("frontend/src/routes/index.tsx")
          content = path.read_text(encoding="utf-8")
          replacements = {
              '<span class="cn">Pro</span>': ('<span class="cn">Comunicação</span>', 2),
              '<span class="cn">RdC</span>': ('<span class="cn">Resolução de Conflitos</span>', 2),
              '<span class="cn">C3</span>': ('<span class="cn">Aderência à Política</span>', 2),
          }

          for abbreviated, (full_name, expected_count) in replacements.items():
              actual_count = content.count(abbreviated)
              if actual_count != expected_count:
                  raise SystemExit(
                      f"Esperadas {expected_count} ocorrências de {abbreviated!r}, encontradas {actual_count}."
                  )
              content = content.replace(abbreviated, full_name)

          path.write_text(content, encoding="utf-8")
          PY

          if grep -nE '<span class="cn">(Pro|RdC|C3)</span>' frontend/src/routes/index.tsx; then
            echo "Ainda existem competências abreviadas na home."
            exit 1
          fi

          grep -nE '<span class="cn">(Comunicação|Resolução de Conflitos|Aderência à Política)</span>' frontend/src/routes/index.tsx
          git diff --check

      - name: Remover workflow temporário e publicar alteração
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/patch-home-competencies.yml
          git add frontend/src/routes/index.tsx
          git commit -m "fix(home): exibir nomes completos das competências"
          git push origin HEAD:fix/home-competencias-sem-abreviacao-20260719
