name: Update Gupy test fixtures

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-fixtures:
    if: github.head_ref == 'feat/gupy-callback-job-redirect-20260715-02'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/gupy-callback-job-redirect-20260715-02
          fetch-depth: 1
          show-progress: false

      - name: Update fixtures
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          output=$(python .github/scripts/update_gupy_test_fixtures.py 2>&1)
          status=$?
          if [ "$status" -ne 0 ]; then
            printf -v body 'Falha ao atualizar fixtures Gupy:\n\n```text\n%s\n```' "$output"
            gh pr comment "$PR_NUMBER" --body "$body"
            exit "$status"
          fi
          printf '%s\n' "$output"

      - name: Remove temporary files
        run: |
          rm .github/scripts/update_gupy_test_fixtures.py
          rm .github/workflows/update-gupy-test-fixtures.yml

      - name: Commit fixtures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: atualizar fixtures com callback Gupy"
          git push origin HEAD:feat/gupy-callback-job-redirect-20260715-02
