name: Patch published version editing

on:
  push:
    branches:
      - fix/bloquear-edicao-versao-publicada-avaliacao-20260716

permissions:
  contents: write

jobs:
  patch-frontend:
    if: ${{ !contains(github.event.head_commit.message || '', 'fix: bloquear edição de versão publicada na avaliação') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/bloquear-edicao-versao-publicada-avaliacao-20260716
          fetch-depth: 0

      - name: Corrigir fluxo de edição
        shell: python
        run: |
          from pathlib import Path

          path = Path("frontend/src/routes/nova.avaliacao.tsx")
          text = path.read_text(encoding="utf-8")

          def replace_exact(old: str, new: str, expected: int = 1) -> None:
              actual = text.count(old)
              if actual != expected:
                  raise RuntimeError(
                      f"Esperado {expected} ocorrência(s), encontrado {actual}: {old[:100]!r}"
                  )
              return text.replace(old, new, expected)

          old = '''  createSimulationDraft,
            getSimulationVersion,
            updateSimulationBlueprint,'''
          new = '''  cloneSimulationVersionToDraft,
            createSimulationDraft,
            getSimulationVersion,
            updateSimulationBlueprint,'''
          if old not in text:
              old = '''  createSimulationDraft,
            getSimulationVersion,
            updateSimulationBlueprint,'''.replace("    ", "  ")
              new = '''  cloneSimulationVersionToDraft,
            createSimulationDraft,
            getSimulationVersion,
            updateSimulationBlueprint,'''.replace("    ", "  ")
          if old not in text:
              raise RuntimeError("Imports da API não encontrados.")
          text = text.replace(old, new, 1)

          marker = 'import { getTranslations, type Language } from "@/lib/translations";\n'
          if marker not in text:
              raise RuntimeError("Import de traduções não encontrado.")
          text = text.replace(
              marker,
              marker + 'import { canEditSimulationVersion } from "@/lib/simulation-meta";\n',
              1,
          )

          old = '''  const versionQuery = useQuery({
            queryKey: ["simulation-version", search.simulationId, search.versionNumber],
            queryFn: () => getSimulationVersion(search.simulationId!, search.versionNumber!),
            enabled: hasVersionContext,
          });'''
          new = '''  const versionQuery = useQuery({
            queryKey: ["simulation-version", search.simulationId, search.versionNumber],
            queryFn: () => getSimulationVersion(search.simulationId!, search.versionNumber!),
            enabled: hasVersionContext,
          });
          const versionStatus = versionQuery.data?.status;
          const isEditable = !hasVersionContext || (versionStatus ? canEditSimulationVersion(versionStatus) : false);'''
          if old not in text:
              old = old.replace("    ", "  ")
              new = new.replace("    ", "  ")
          if old not in text:
              raise RuntimeError("Consulta da versão não encontrada.")
          text = text.replace(old, new, 1)

          old = '''  const updateExistingMutation = useMutation({
            mutationFn: () =>
              updateSimulationBlueprint(search.simulationId!, search.versionNumber!, {'''
          new = '''  const updateExistingMutation = useMutation({
            mutationFn: () => {
              if (!isEditable) {
                throw new Error("Esta versão não pode ser editada. Crie um rascunho antes de alterar.");
              }
              return updateSimulationBlueprint(search.simulationId!, search.versionNumber!, {'''
          if old not in text:
              old = old.replace("    ", "  ")
              new = new.replace("    ", "  ")
          if old not in text:
              raise RuntimeError("Mutation de atualização não encontrada.")
          text = text.replace(old, new, 1)

          old = '''        criticalSituation: criticalSituation.trim(),
              }),
            onSuccess: async (simulation) => {'''
          new = '''        criticalSituation: criticalSituation.trim(),
              });
            },
            onSuccess: async (simulation) => {'''
          if old not in text:
              old = old.replace("    ", "  ")
              new = new.replace("    ", "  ")
          if old not in text:
              raise RuntimeError("Fechamento da mutation não encontrado.")
          text = text.replace(old, new, 1)

          marker = '''  const addCompetencyMutation = useMutation({'''
          clone_block = '''  const cloneDraftMutation = useMutation({
            mutationFn: () => cloneSimulationVersionToDraft(search.simulationId!, search.versionNumber!),
            onSuccess: async (draft) => {
              await queryClient.invalidateQueries({ queryKey: ["simulations"] });
              void navigate({
                to: "/nova/avaliacao",
                search: {
                  simulationId: draft.simulationId,
                  versionNumber: draft.newVersionNumber,
                },
              });
            },
          });

'''
          if marker not in text:
              marker = marker.replace("    ", "  ")
              clone_block = clone_block.replace("    ", "  ")
          if marker not in text:
              raise RuntimeError("Mutation de competência não encontrada.")
          text = text.replace(marker, clone_block + marker, 1)

          marker = '''            <p className="text-sm text-muted-foreground">'''
          banner = '''            {versionStatus && !isEditable && (
              <StateBanner
                tone="warn"
                title="Esta versão publicada não pode ser editada"
                action={
                  versionStatus === "published" ? (
                    <button
                      type="button"
                      onClick={() => cloneDraftMutation.mutate()}
                      disabled={cloneDraftMutation.isPending}
                      className="shrink-0 rounded-md border border-current/20 bg-background/70 px-3 py-2 text-xs font-medium hover:bg-background disabled:cursor-not-allowed disabled:opacity-60"
                    >
                      {cloneDraftMutation.isPending ? "Criando..." : "Criar rascunho"}
                    </button>
                  ) : undefined
                }
              >
                A versão no ar permanece protegida. Crie um rascunho para alterar o plano sem afetar candidatos em andamento.
              </StateBanner>
            )}

            {cloneDraftMutation.isError && (
              <StateBanner tone="danger" title="Não foi possível criar o rascunho">
                {cloneDraftMutation.error instanceof Error
                  ? cloneDraftMutation.error.message
                  : "Tente novamente."}
              </StateBanner>
            )}

'''
          if marker not in text:
              marker = marker.replace("    ", "  ")
              banner = banner.replace("    ", "  ")
          if marker not in text:
              raise RuntimeError("Ponto de inserção do aviso não encontrado.")
          text = text.replace(marker, banner + marker, 1)

          replacements = [
              ('value={role}\n                  onChange=', 'value={role}\n                  disabled={!isEditable}\n                  onChange='),
              ('value={criticalSituation}\n                onChange=', 'value={criticalSituation}\n                disabled={!isEditable}\n                onChange='),
              ('disabled={empresaConfigLoading || addCompetencyMutation.isPending}', 'disabled={!isEditable || empresaConfigLoading || addCompetencyMutation.isPending}'),
              ('checked={selectedCompetencies.includes(competency.value)}\n                        onChange=', 'checked={selectedCompetencies.includes(competency.value)}\n                        disabled={!isEditable}\n                        onChange='),
              ('value={newCompetency}\n                  onChange=', 'value={newCompetency}\n                  disabled={!isEditable}\n                  onChange='),
              ('disabled={!canAddCompetency || addCompetencyMutation.isPending}', 'disabled={!isEditable || !canAddCompetency || addCompetencyMutation.isPending}'),
          ]
          for old, new in replacements:
              if old not in text:
                  raise RuntimeError(f"Controle editável não encontrado: {old!r}")
              text = text.replace(old, new, 1)

          old = '''                  disabled={createDraftMutation.isPending || updateExistingMutation.isPending}
                    title={canGoNext ? copy.createDraftTitle : copy.disabledNextTitle}
                    onClick={() => {
                      if (!canGoNext) {
                        setSubmitAttempted(true);
                        return;
                      }
                      if (hasVersionContext) {
                        updateExistingMutation.mutate();
                        return;
                      }
                      createDraftMutation.mutate();
                    }}
                    aria-disabled={!canGoNext}
                    className={`rounded-md bg-primary px-5 py-2 text-sm font-medium text-primary-foreground hover:bg-primary/90 ${
                      !canGoNext || createDraftMutation.isPending || updateExistingMutation.isPending
                        ? "cursor-not-allowed opacity-50"
                        : ""
                    }`}
                  >
                    {createDraftMutation.isPending ? copy.creatingDraft : copy.next}'''
          new = '''                  disabled={
                    createDraftMutation.isPending ||
                    updateExistingMutation.isPending ||
                    cloneDraftMutation.isPending
                  }
                  title={
                    !isEditable
                      ? "Criar uma nova versão em rascunho"
                      : canGoNext
                        ? copy.createDraftTitle
                        : copy.disabledNextTitle
                  }
                  onClick={() => {
                    if (!isEditable && hasVersionContext) {
                      cloneDraftMutation.mutate();
                      return;
                    }
                    if (!canGoNext) {
                      setSubmitAttempted(true);
                      return;
                    }
                    if (hasVersionContext) {
                      updateExistingMutation.mutate();
                      return;
                    }
                    createDraftMutation.mutate();
                  }}
                  aria-disabled={isEditable && !canGoNext}
                  className={`rounded-md bg-primary px-5 py-2 text-sm font-medium text-primary-foreground hover:bg-primary/90 ${
                    (isEditable && !canGoNext) ||
                    createDraftMutation.isPending ||
                    updateExistingMutation.isPending ||
                    cloneDraftMutation.isPending
                      ? "cursor-not-allowed opacity-50"
                      : ""
                  }`}
                >
                  {!isEditable
                    ? cloneDraftMutation.isPending
                      ? "Criando rascunho..."
                      : "Criar rascunho"
                    : createDraftMutation.isPending
                      ? copy.creatingDraft
                      : copy.next}'''
          if old not in text:
              old = old.replace("    ", "  ")
              new = new.replace("    ", "  ")
          if old not in text:
              raise RuntimeError("Botão de avanço não encontrado.")
          text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")

      - name: Commitar correção e remover workflow temporário
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/patch-published-version-edit.yml
          git add frontend/src/routes/nova.avaliacao.tsx
          git commit -m "fix: bloquear edição de versão publicada na avaliação"
          git push origin HEAD:refs/heads/fix/bloquear-edicao-versao-publicada-avaliacao-20260716
