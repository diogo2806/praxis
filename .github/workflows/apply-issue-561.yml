name: Aplicar correção da issue 561

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-fix:
    if: ${{ github.head_ref == 'fix/561-media-mutation-scope-20260723' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Corrigir mutations e validar frontend
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("frontend/src/routes/nova.dialogo.tsx")
          content = path.read_text(encoding="utf-8")
          replacements = [
              (
                  "      mediaUrl,\n      mediaType,\n    }: {\n      nodeId: string;",
                  "      mediaUrl,\n      mediaType,\n      mediaTranscript,\n      mediaCaptionsUrl,\n      mediaVersion,\n    }: {\n      nodeId: string;",
              ),
              (
                  "      mediaUrl,\n      mediaType,\n    }: {\n      nodeId: string;\n      optionId: string;",
                  "      mediaUrl,\n      mediaType,\n      mediaTranscript,\n      mediaCaptionsUrl,\n      mediaVersion,\n    }: {\n      nodeId: string;\n      optionId: string;",
              ),
          ]
          for source, target in replacements:
              if source not in content:
                  raise SystemExit(f"Padrão não encontrado: {source!r}")
              content = content.replace(source, target, 1)
          path.write_text(content, encoding="utf-8")
          PY
          cd frontend
          npm ci
          npm run typecheck
          npm run lint
          npm run test:candidate-media-a11y
          cd ..
          git rm .github/workflows/apply-issue-561.yml

      - name: Registrar correção
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(frontend): corrigir escopo dos metadados de mídia (#561)"
          git push origin HEAD:${{ github.head_ref }}
