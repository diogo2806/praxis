name: Finalize Gupy real result pages

on:
  push:
    branches:
      - fix/gupy-real-result-pages-20260715-01
    paths:
      - .github/scripts/finalize_gupy_real_result_pages.py
      - .github/workflows/finalize-gupy-real-result-pages.yml

permissions:
  contents: write

jobs:
  finalize-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/gupy-real-result-pages-20260715-01
          fetch-depth: 0

      - name: Apply final changes
        run: python .github/scripts/finalize_gupy_real_result_pages.py

      - name: Remove temporary automation
        run: |
          rm .github/scripts/finalize_gupy_real_result_pages.py
          rm .github/workflows/finalize-gupy-real-result-pages.yml

      - name: Commit final implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: registrar páginas reais da integração Gupy"
          git push origin HEAD:fix/gupy-real-result-pages-20260715-01
