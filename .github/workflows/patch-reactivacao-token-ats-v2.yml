name: Apply ATS reactivation token fix v2

on:
  push:
    branches:
      - fix/reactivacao-token-ats-20260714-01

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Apply source changes
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              content = file.read_text(encoding="utf-8")
              matches = content.count(old)
              if matches != 1:
                  raise SystemExit(f"Expected exactly one literal match in {path}, found {matches}")
              file.write_text(content.replace(old, new, 1), encoding="utf-8")

          def replace_regex(path: str, pattern: str, replacement: str) -> None:
              file = Path(path)
              content = file.read_text(encoding="utf-8")
              updated, count = re.subn(pattern, replacement, content, count=1, flags=re.DOTALL)
              if count != 1:
                  raise SystemExit(f"Expected exactly one regex match in {path}, found {count}")
              file.write_text(updated, encoding="utf-8")

          replace_once(
              "backend/src/main/java/br/com/iforce/praxis/shared/integration/dto/IntegrationResponse.java",
              "        String errorMessage,\n        String tokenPreview,\n        List<IntegrationAction> availableActions\n",
              "        String errorMessage,\n        String tokenPreview,\n        String token,\n        Instant tokenCreatedAt,\n        List<IntegrationAction> availableActions\n",
          )

          new_reactivate = """    @Transactional
              public IntegrationResponse reactivate(String provider) {
                  String empresaId = currentEmpresaService.requiredEmpresaId();
                  String actorUserId = currentUserService.requiredUserId();
                  IntegrationCatalog.Definition definition = IntegrationCatalog.requireDefinition(provider);
                  EmpresaIntegrationEntity entity = requireIntegration(empresaId, definition.provider());

                  if (entity.getStatus() != IntegrationStatus.DESATIVADA) {
                      throw new ResponseStatusException(HttpStatus.CONFLICT, \"Integração não está desativada.\");
                  }
                  IntegrationStatus previousStatus = entity.getStatus();
                  Instant now = Instant.now();
                  String rawToken = null;
                  Instant tokenCreatedAt = null;

                  if (usesAccessToken(definition.provider())) {
                      var rotatedToken = integrationTokenAdminService.rotateToken(definition.tokenProvider());
                      rawToken = rotatedToken.token();
                      tokenCreatedAt = rotatedToken.createdAt();
                      entity.setCredentialsHash(sha256(rawToken));
                      entity.setTokenPreview(buildTokenPreview(rawToken));
                  }
                  entity.setStatus(IntegrationStatus.PENDENTE);
                  entity.setDisabledAt(null);
                  entity.setLastSyncAt(null);
                  entity.setConfiguredAt(now);
                  entity.setLastErrorMessage(null);
                  entity.setUpdatedAt(now);
                  EmpresaIntegrationEntity saved = empresaIntegrationRepository.save(entity);

                  appendAudit(empresaId, actorUserId, definition.provider(), previousStatus, saved.getStatus(),
                          AuditEventType.INTEGRATION_REACTIVATED, null);
                  return toResponse(definition, saved, rawToken, tokenCreatedAt);
              }
          """.replace("              ", "    ")

          replace_regex(
              "backend/src/main/java/br/com/iforce/praxis/shared/integration/IntegrationManagementService.java",
              r"    @Transactional\n    public IntegrationResponse reactivate\(String provider\) \{.*?\n    \}\n\n    @Transactional\n    public IntegrationResponse sync",
              new_reactivate + "\n    @Transactional\n    public IntegrationResponse sync",
          )

          new_to_response = """    private IntegrationResponse toResponse(
              IntegrationCatalog.Definition definition,
              EmpresaIntegrationEntity entity
          ) {
              return toResponse(definition, entity, null, null);
          }

          private IntegrationResponse toResponse(
              IntegrationCatalog.Definition definition,
              EmpresaIntegrationEntity entity,
              String rawToken,
              Instant tokenCreatedAt
          ) {
              IntegrationStatus status = entity == null ? IntegrationStatus.NAO_CONFIGURADA : entity.getStatus();
              return new IntegrationResponse(
                      definition.provider(),
                      definition.name(),
                      definition.description(),
                      definition.type(),
                      status,
                      entity == null ? null : entity.getLastSyncAt(),
                      entity == null ? null : entity.getConfiguredAt(),
                      entity == null ? null : entity.getLastErrorMessage(),
                      entity == null ? null : entity.getTokenPreview(),
                      rawToken,
                      tokenCreatedAt,
                      actionsFor(status, definition.provider(), definition.supportsManualSync())
              );
          }

          """

          replace_regex(
              "backend/src/main/java/br/com/iforce/praxis/shared/integration/IntegrationManagementService.java",
              r"    private IntegrationResponse toResponse\(\n            IntegrationCatalog\.Definition definition,\n            EmpresaIntegrationEntity entity\n    \) \{.*?\n    \}\n\n    private static List<IntegrationAction> actionsFor",
              new_to_response + "    private static List<IntegrationAction> actionsFor",
          )

          replace_once(
              "frontend/src/lib/api/praxis.ts",
              "  errorMessage: string | null;\n  tokenPreview: string | null;\n  availableActions: IntegrationCenterAction[];\n",
              "  errorMessage: string | null;\n  tokenPreview: string | null;\n  /** Presente apenas na resposta que cria ou reativa uma credencial. */\n  token?: string | null;\n  /** Data de criação do token retornado uma única vez. */\n  tokenCreatedAt?: string | null;\n  availableActions: IntegrationCenterAction[];\n",
          )

          replace_once(
              "frontend/src/routes/integrations.tsx",
              "  const reactivateMutation = useMutation({\n    mutationFn: reactivateIntegration,\n    onSuccess: invalidate,\n  });\n",
              "  const reactivateMutation = useMutation({\n    mutationFn: reactivateIntegration,\n    onSuccess: async (data) => {\n      if (data.token) {\n        setGeneratedToken({\n          provider: data.provider,\n          token: data.token,\n          tokenPreview: data.tokenPreview ?? \"********\",\n          createdAt: data.tokenCreatedAt ?? new Date().toISOString(),\n        });\n      }\n      await invalidate();\n    },\n  });\n",
          )

          replace_once(
              "frontend/src/routes/integrations.$provider.tsx",
              "  const reactivateMutation = useMutation({\n    mutationFn: () => reactivateIntegration(provider!),\n    onSuccess: invalidate,\n  });\n",
              "  const reactivateMutation = useMutation({\n    mutationFn: () => reactivateIntegration(provider!),\n    onSuccess: async (data) => {\n      if (data.token) {\n        setGeneratedToken({\n          provider: data.provider,\n          token: data.token,\n          tokenPreview: data.tokenPreview ?? \"********\",\n          createdAt: data.tokenCreatedAt ?? new Date().toISOString(),\n        });\n      }\n      await invalidate();\n    },\n  });\n",
          )

          Path("backend/src/test/java/br/com/iforce/praxis/shared/integration/IntegrationManagementServiceTest.java").write_text("""package br.com.iforce.praxis.shared.integration;

          import br.com.iforce.praxis.audit.service.AuditEventService;
          import br.com.iforce.praxis.auth.persistence.repository.EmpresaRepository;
          import br.com.iforce.praxis.auth.service.CurrentEmpresaService;
          import br.com.iforce.praxis.auth.service.CurrentUserService;
          import br.com.iforce.praxis.shared.integration.dto.ConfigureIntegrationRequest;
          import br.com.iforce.praxis.shared.integration.dto.RotateIntegrationTokenResponse;
          import br.com.iforce.praxis.shared.integration.model.IntegrationAction;
          import br.com.iforce.praxis.shared.integration.model.IntegrationProvider;
          import br.com.iforce.praxis.shared.integration.model.IntegrationStatus;
          import br.com.iforce.praxis.shared.integration.model.IntegrationType;
          import br.com.iforce.praxis.shared.integration.persistence.entity.EmpresaIntegrationEntity;
          import br.com.iforce.praxis.shared.integration.persistence.repository.EmpresaIntegrationRepository;
          import com.fasterxml.jackson.databind.ObjectMapper;
          import org.junit.jupiter.api.Test;
          import org.springframework.web.server.ResponseStatusException;

          import java.time.Instant;
          import java.util.Map;
          import java.util.Optional;

          import static org.assertj.core.api.Assertions.assertThat;
          import static org.assertj.core.api.Assertions.assertThatThrownBy;
          import static org.mockito.ArgumentMatchers.any;
          import static org.mockito.Mockito.mock;
          import static org.mockito.Mockito.verify;
          import static org.mockito.Mockito.when;

          class IntegrationManagementServiceTest {

              private final CurrentEmpresaService currentEmpresaService = mock(CurrentEmpresaService.class);
              private final CurrentUserService currentUserService = mock(CurrentUserService.class);
              private final EmpresaRepository empresaRepository = mock(EmpresaRepository.class);
              private final EmpresaIntegrationRepository empresaIntegrationRepository = mock(EmpresaIntegrationRepository.class);
              private final IntegrationTokenAdminService integrationTokenAdminService = mock(IntegrationTokenAdminService.class);
              private final AuditEventService auditEventService = mock(AuditEventService.class);
              private final IntegrationManagementService service = new IntegrationManagementService(
                      currentEmpresaService,
                      currentUserService,
                      empresaRepository,
                      empresaIntegrationRepository,
                      integrationTokenAdminService,
                      auditEventService,
                      new ObjectMapper()
              );

              @Test
              void unconfiguredGupyOffersGenerateTokenNotConfigure() {
                  when(currentEmpresaService.requiredEmpresaId()).thenReturn("empresa-1");
                  when(empresaIntegrationRepository.findFirstByEmpresaIdAndProvider("empresa-1", IntegrationProvider.GUPY))
                          .thenReturn(Optional.empty());

                  var response = service.getIntegration("gupy");

                  assertThat(response.availableActions()).containsExactly(IntegrationAction.GENERATE_TOKEN);
              }

              @Test
              void unconfiguredRecruteiOffersGenerateTokenNotConfigure() {
                  when(currentEmpresaService.requiredEmpresaId()).thenReturn("empresa-1");
                  when(empresaIntegrationRepository.findFirstByEmpresaIdAndProvider("empresa-1", IntegrationProvider.RECRUTEI))
                          .thenReturn(Optional.empty());

                  var response = service.getIntegration("recrutei");

                  assertThat(response.availableActions()).containsExactly(IntegrationAction.GENERATE_TOKEN);
              }

              @Test
              void configureRejectsGupyAndPointsToTokenEndpoint() {
                  assertThatThrownBy(() ->
                          service.configure("gupy", new ConfigureIntegrationRequest(Map.of(), Map.of()))
                  )
                          .isInstanceOf(ResponseStatusException.class)
                          .hasMessageContaining("/tokens");
              }

              @Test
              void configureRejectsRecrutei() {
                  assertThatThrownBy(() ->
                          service.configure("recrutei", new ConfigureIntegrationRequest(Map.of(), Map.of()))
                  )
                          .isInstanceOf(ResponseStatusException.class);
              }

              @Test
              void reactivateGupyReturnsNewTokenOnlyOnceAndKeepsIntegrationPending() {
                  String empresaId = "empresa-1";
                  String rawToken = "prx_abcdefghijklmnopqrstuvwxyz0123456789";
                  Instant tokenCreatedAt = Instant.parse("2026-07-14T12:00:00Z");
                  EmpresaIntegrationEntity entity = new EmpresaIntegrationEntity();
                  entity.setProvider(IntegrationProvider.GUPY);
                  entity.setType(IntegrationType.ATS);
                  entity.setStatus(IntegrationStatus.DESATIVADA);
                  entity.setCredentialsHash("hash-antigo");
                  entity.setTokenPreview("token-antigo****");
                  entity.setLastSyncAt(Instant.parse("2026-07-01T10:00:00Z"));
                  entity.setCreatedAt(Instant.parse("2026-06-01T10:00:00Z"));
                  entity.setUpdatedAt(Instant.parse("2026-07-01T10:00:00Z"));

                  when(currentEmpresaService.requiredEmpresaId()).thenReturn(empresaId);
                  when(currentUserService.requiredUserId()).thenReturn("usuario-1");
                  when(empresaIntegrationRepository.findFirstByEmpresaIdAndProvider(empresaId, IntegrationProvider.GUPY))
                          .thenReturn(Optional.of(entity));
                  when(integrationTokenAdminService.rotateToken("gupy"))
                          .thenReturn(new RotateIntegrationTokenResponse("gupy", true, tokenCreatedAt, rawToken));
                  when(empresaIntegrationRepository.save(any(EmpresaIntegrationEntity.class)))
                          .thenAnswer(invocation -> invocation.getArgument(0));

                  var response = service.reactivate("gupy");

                  assertThat(response.status()).isEqualTo(IntegrationStatus.PENDENTE);
                  assertThat(response.token()).isEqualTo(rawToken);
                  assertThat(response.tokenCreatedAt()).isEqualTo(tokenCreatedAt);
                  assertThat(response.tokenPreview()).isEqualTo("prx_abcd****");
                  assertThat(response.availableActions()).containsExactly(IntegrationAction.GENERATE_TOKEN);
                  assertThat(entity.getStatus()).isEqualTo(IntegrationStatus.PENDENTE);
                  assertThat(entity.getCredentialsHash()).isNotBlank().isNotEqualTo(rawToken).isNotEqualTo("hash-antigo");
                  assertThat(entity.getTokenPreview()).isEqualTo("prx_abcd****");
                  assertThat(entity.getLastSyncAt()).isNull();
                  assertThat(entity.getDisabledAt()).isNull();
                  assertThat(entity.getConfiguredAt()).isNotNull();
                  verify(integrationTokenAdminService).rotateToken("gupy");

                  var laterResponse = service.getIntegration("gupy");
                  assertThat(laterResponse.status()).isEqualTo(IntegrationStatus.PENDENTE);
                  assertThat(laterResponse.token()).isNull();
                  assertThat(laterResponse.tokenCreatedAt()).isNull();
              }
          }
          """.replace("          ", ""), encoding="utf-8")

          Path("docs/requisitos/REQ-INTEGRACOES-REATIVACAO-TOKEN-ATS.md").write_text("""# REQ-INTEGRACOES-REATIVACAO-TOKEN-ATS

          ## Objetivo

          Corrigir a reativação das integrações Gupy e Recrutei para que a nova credencial não seja perdida e para que o sistema não declare conexão antes de uma comunicação real do ATS.

          ## Regras implementadas

          - A reativação revoga imediatamente a credencial anterior e gera um token novo.
          - O banco persiste somente o hash e a prévia segura do novo token.
          - O token completo é incluído somente na resposta HTTP da reativação.
          - Consultas posteriores da integração nunca retornam o token completo.
          - O frontend apresenta o token retornado para cópia, usando o mesmo fluxo seguro de geração e rotação.
          - A integração reativada fica em `PENDENTE`.
          - A evidência de atividade anterior é limpa porque pertence à credencial revogada.
          - A integração muda para `CONECTADA` somente quando o novo token for usado em uma requisição autenticada real.

          ## Critérios de aceite

          ### CA-01 — Retorno único do novo token

          **Dado** que uma integração ATS está `DESATIVADA`  
          **Quando** o usuário reativá-la  
          **Então** o token anterior deve ser invalidado  
          **E** um token novo deve ser retornado integralmente na resposta  
          **E** esse valor deve ser apresentado ao usuário para cópia.

          ### CA-02 — Persistência segura

          **Dado** que o token novo foi gerado  
          **Quando** a reativação for persistida  
          **Então** somente o hash e a prévia segura devem permanecer no banco  
          **E** uma consulta posterior não deve retornar o token completo.

          ### CA-03 — Estado pendente

          **Dado** que a integração foi reativada  
          **E** a Gupy ou o Recrutei ainda não utilizou o token novo  
          **Então** o status deve ser `PENDENTE`  
          **E** a atividade anterior deve ser limpa  
          **E** o sistema não deve mostrar a integração como conectada.

          ### CA-04 — Conexão posterior

          **Dado** que a integração está `PENDENTE` após a reativação  
          **Quando** o ATS fizer uma requisição autenticada usando o token novo  
          **Então** o fluxo existente de registro de atividade poderá alterar o status para `CONECTADA`.
          """.replace("          ", ""), encoding="utf-8")
          PY

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend unit test
        working-directory: backend
        run: mvn -B -ntp -Dtest=IntegrationManagementServiceTest test

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Commit validated changes
        run: |
          rm -f .github/workflows/patch-reactivacao-token-ats.yml
          rm -f .github/workflows/patch-reactivacao-token-ats-v2.yml
          rm -f .github/patch-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: retornar token ao reativar integração ATS"
          git push origin HEAD
