name: Aplicar correção mínima da issue 565

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'fix/565-integrity-evidence-retention-injection-20260723' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Aplicar e testar
        run: |
          python3 - <<'PY'
          from pathlib import Path

          service = Path("backend/src/main/java/br/com/iforce/praxis/integrity/service/IntegrityEvidenceRetentionService.java")
          source = service.read_text(encoding="utf-8")
          source = source.replace(
              "import org.springframework.beans.factory.annotation.Value;",
              "import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;",
              1,
          )
          source = source.replace(
              "    public IntegrityEvidenceRetentionService(",
              "    @Autowired\n    public IntegrityEvidenceRetentionService(",
              1,
          )
          service.write_text(source, encoding="utf-8")

          test = Path("backend/src/test/java/br/com/iforce/praxis/integrity/service/IntegrityEvidenceRetentionServiceSpringWiringTest.java")
          test.parent.mkdir(parents=True, exist_ok=True)
          test.write_text("\n".join([
              "package br.com.iforce.praxis.integrity.service;",
              "",
              "import org.junit.jupiter.api.Test;",
              "import org.springframework.beans.factory.annotation.Autowired;",
              "",
              "import static org.assertj.core.api.Assertions.assertThat;",
              "",
              "class IntegrityEvidenceRetentionServiceSpringWiringTest {",
              "",
              "    @Test",
              "    void declaresProductionConstructorForSpringInjection() {",
              "        assertThat(IntegrityEvidenceRetentionService.class.getConstructors()).hasSize(1);",
              "        assertThat(IntegrityEvidenceRetentionService.class.getConstructors()[0]",
              "                .isAnnotationPresent(Autowired.class)).isTrue();",
              "    }",
              "}",
              "",
          ]), encoding="utf-8")
          PY
          cd backend
          mvn -B -Dtest=IntegrityEvidenceRetentionServiceSpringWiringTest test
          cd ..
          git rm -f .github/workflows/apply-issue-565.yml
          git rm -f .github/workflows/apply-issue-565-v2.yml
      - name: Commitar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(backend): declarar construtor injetável da retenção de evidências (#565)"
          git push origin HEAD:${{ github.head_ref }}
