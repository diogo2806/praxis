name: Aplicar correção de salvamento das pontuações

on:
  push:
    branches:
      - fix/autosave-pontuacoes-dialogo-20260721

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/autosave-pontuacoes-dialogo-20260721
          fetch-depth: 0

      - name: Atualizar editor de diálogo
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("frontend/src/routes/nova.dialogo.tsx")
          content = path.read_text(encoding="utf-8")

          import_anchor = 'import { WizardStepper } from "@/components/wizard-stepper";'
          import_replacement = (
              'import { OptionCompetencyScoreFields } from '
              '"@/components/simulation/option-competency-score-fields";\n'
              + import_anchor
          )
          if import_anchor not in content:
              raise SystemExit("Import de referência não encontrado.")
          content = content.replace(import_anchor, import_replacement, 1)

          old_block = '''                        {Object.entries(option.competencyLevels).map(([name, value]) => (
                          <label
                            key={name}
                            className="inline-flex items-center gap-1 rounded border border-border px-2 py-1"
                          >
                            {name}
                            <input
                              className="w-12 rounded border border-border bg-card px-1 py-0.5"
                              type="number"
                              min={0}
                              max={100}
                              step={1}
                              defaultValue={value}
                              onBlur={(event) => {
                                const nextValue = Number(event.target.value);
                                if (!Number.isInteger(nextValue) || nextValue < 0 || nextValue > 100) {
                                  event.target.value = String(value);
                                  setFeedbackMessage(
                                    `Pontuação inválida para ${name}. Use um inteiro de 0 a 100.`,
                                  );
                                  return;
                                }
                                setFeedbackMessage(null);
                                updateOptionMutation.mutate({
                                  nodeId: selected.id,
                                  optionId: option.id,
                                  competencyLevels: {
                                    ...option.competencyLevels,
                                    [name]: nextValue,
                                  },
                                });
                              }}
                            />
                          </label>
                        ))}'''

          new_block = '''                        <OptionCompetencyScoreFields
                          initialLevels={option.competencyLevels}
                          onValidationError={setFeedbackMessage}
                          onSave={(levels) =>
                            updateOptionMutation.mutateAsync({
                              nodeId: selected.id,
                              optionId: option.id,
                              competencyLevels: levels,
                            })
                          }
                        />'''

          if old_block not in content:
              raise SystemExit("Bloco de pontuações esperado não encontrado.")
          content = content.replace(old_block, new_block, 1)
          path.write_text(content, encoding="utf-8")
          PY

      - name: Validar frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Commitar correção e remover workflow temporário
        shell: bash
        run: |
          rm .github/workflows/apply-dialog-score-autosave-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/routes/nova.dialogo.tsx .github/workflows/apply-dialog-score-autosave-fix.yml
          git commit -m "fix(frontend): salvar pontuações durante a edição"
          git push origin HEAD:fix/autosave-pontuacoes-dialogo-20260721
