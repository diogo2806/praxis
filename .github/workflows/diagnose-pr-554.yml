name: Diagnosticar PR 554

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  diagnostics:
    if: ${{ github.head_ref == 'feat/500-video-acessivel-20260723' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diagnosticar documentação
        shell: bash
        run: python3 scripts/validate_docs.py > docs-diagnostic.log 2>&1 || true

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Diagnosticar instalação frontend
        shell: bash
        run: |
          cd frontend
          npm ci > ../npm-diagnostic.log 2>&1 || true

      - name: Publicar diagnósticos
        uses: actions/upload-artifact@v4
        with:
          name: pr-554-diagnostics
          path: |
            docs-diagnostic.log
            npm-diagnostic.log
          retention-days: 2
