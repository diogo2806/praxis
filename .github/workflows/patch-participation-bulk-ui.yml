          git add frontend/src/routes/participacoes.tsx \
                  frontend/src/routes/participacoes.operacoes-em-lote.tsx \
                  frontend/src/lib/screen-manual-overrides.ts \
                  frontend/package.json \
                  .github/workflows/patch-participation-bulk-ui.yml
          git commit -m "feat(participacoes): integrar operações em lote à interface"
          git push origin HEAD:feat/543-participacoes-lote-visoes-tags-20260723
