              raise SystemExit("Não foi possível localizar o final dos manuais")
          manual.write_text(manual_text.replace(tail, manual_entry, 1), encoding="utf-8")

          package = Path("frontend/package.json")
          package_data = json.loads(package.read_text(encoding="utf-8"))
