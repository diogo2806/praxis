name: Patch participation bulk UI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - .github/workflows/patch-participation-bulk-ui.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/543-participacoes-lote-visoes-tags-20260723
      - name: Integrate route entry, manual and test script
        shell: python
        run: |
          from pathlib import Path
          import json

          participation = Path("frontend/src/routes/participacoes.tsx")
          text = participation.read_text(encoding="utf-8")
          marker = '''            <Button
              variant="outline"
              className="gap-2 bg-card"
              onClick={() => void refreshAll()}
'''
          replacement = '''            <Button asChild variant="outline" className="gap-2 bg-card">
              <Link to="/participacoes/operacoes-em-lote">
                <Workflow className="h-4 w-4" />
                Operações em lote
              </Link>
            </Button>
            <Button
              variant="outline"
              className="gap-2 bg-card"
              onClick={() => void refreshAll()}
'''
          if marker not in text:
              raise SystemExit("Não foi possível localizar o ponto de entrada em participacoes.tsx")
          participation.write_text(text.replace(marker, replacement, 1), encoding="utf-8")

          route = Path("frontend/src/routes/participacoes.operacoes-em-lote.tsx")
          route_text = route.read_text(encoding="utf-8")
          route.write_text(route_text.replace("  Tag,\n", "", 1), encoding="utf-8")

          manual = Path("frontend/src/lib/screen-manual-overrides.ts")
          manual_text = manual.read_text(encoding="utf-8")
          tail = '''];

