name: Apply Gupy callback contract

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply-contract:
    if: github.head_ref == 'feat/gupy-callback-job-redirect-20260715-01'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/gupy-callback-job-redirect-20260715-01
          fetch-depth: 0

      - name: Apply source changes
        run: python .github/scripts/apply_gupy_callback_contract.py

      - name: Remove temporary automation
        run: |
          rm .github/scripts/apply_gupy_callback_contract.py
          rm .github/workflows/apply-gupy-callback-contract.yml

      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implementar callback e retorno final da Gupy"
          git push origin HEAD:feat/gupy-callback-job-redirect-20260715-01
